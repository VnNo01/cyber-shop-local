<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - NEON//MARKET</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="noise"></div>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark">N/M</span>
        <span>
          <strong>NEON//MARKET</strong>
          <small>identity gateway</small>
        </span>
      </a>
      <nav class="nav-links" aria-label="Điều hướng chính">
        <a href="/">Cửa hàng</a>
        <a href="/account">Tài khoản</a>
      </nav>
    </header>

    <main class="auth-shell">
      <section class="auth-card">
        <div>
          <p class="eyebrow">Account access</p>
          <h1>Đăng nhập tài khoản</h1>
          <p class="auth-copy">Tài khoản đăng ký sẽ được lưu vào database SQLite ở backend local.</p>
        </div>

        <div class="auth-tabs" role="tablist" aria-label="Chọn chế độ">
          <button class="is-active" type="button" data-tab="login">Đăng nhập</button>
          <button type="button" data-tab="register">Đăng ký</button>
        </div>

        <form class="auth-form is-active" id="loginForm">
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required placeholder="you@neon.local" />
          </label>
          <label>
            Mật khẩu
            <input name="password" type="password" autocomplete="current-password" required minlength="6" placeholder="Tối thiểu 6 ký tự" />
          </label>
          <button class="checkout-btn" type="submit">Đăng nhập</button>
        </form>

        <form class="auth-form" id="registerForm">
          <label>
            Tên hiển thị
            <input name="name" type="text" autocomplete="name" required minlength="2" placeholder="Cyber Buyer" />
          </label>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required placeholder="you@neon.local" />
          </label>
          <label>
            Mật khẩu
            <input name="password" type="password" autocomplete="new-password" required minlength="6" placeholder="Tối thiểu 6 ký tự" />
          </label>
          <button class="checkout-btn" type="submit">Tạo tài khoản</button>
        </form>

        <div class="divider"><span>hoặc đăng nhập bằng</span></div>
        <div class="oauth-grid">
          <a class="oauth-btn facebook" href="/auth/facebook">Facebook</a>
          <a class="oauth-btn google" href="/auth/google">Google</a>
          <a class="oauth-btn github" href="/auth/github">GitHub</a>
        </div>

        <p class="auth-status" id="authStatus" role="status" aria-live="polite"></p>
      </section>

      <section class="auth-preview">
        <div class="screen">
          <div class="scanline"></div>
          <div class="core">LOGIN</div>
        </div>
        <div class="device-meta">
          <span>Secure local backend</span>
          <strong>SQLite</strong>
        </div>
      </section>
    </main>

    <script src="auth.js"></script>
  </body>
</html>
