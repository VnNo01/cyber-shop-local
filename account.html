<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tài khoản - NEON//MARKET</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="noise"></div>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark">N/M</span>
        <span>
          <strong>NEON//MARKET</strong>
          <small>account vault</small>
        </span>
      </a>
      <nav class="nav-links" aria-label="Điều hướng chính">
        <a href="/">Cửa hàng</a>
        <a href="/login">Đăng nhập</a>
      </nav>
    </header>

    <main class="account-shell">
      <section class="account-panel">
        <p class="eyebrow">Signed profile</p>
        <h1>Hồ sơ tài khoản</h1>
        <div class="account-grid" id="accountGrid">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
        <section class="order-list" id="orderList" aria-live="polite"></section>
        <div class="account-actions">
          <a class="primary-btn" href="/">Quay lại mua hàng</a>
          <button class="ghost-btn" id="logoutBtn" type="button">Đăng xuất</button>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="account.js"></script>
  </body>
</html>
